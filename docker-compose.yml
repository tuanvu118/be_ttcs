name: TTCS

services:
  api:
    build: .
    container_name: TTCS
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - WATCHFILES_FORCE_POLLING=true
      - REDIS_HOST=redis_cache
      - REDIS_PORT=6379
    depends_on:
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    restart: unless-stopped