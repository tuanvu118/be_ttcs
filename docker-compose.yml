name: TTCS
services:
  api:
    build: .
    container_name: TTCS
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - WATCHFILES_FORCE_POLLING=true
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    restart: unless-stopped
